name: nailvault
description: A production-grade Flutter app for nail technicians to manage clients, appointments, and photo portfolios.
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.2.0
  supabase_flutter: ^2.2.0
  shared_preferences: ^2.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.0
  freezed_annotation: ^2.0.0
  json_annotation: ^4.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.0.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.0.0
  json_serializable: ^6.0.0

flutter:
  uses-material-design: true
